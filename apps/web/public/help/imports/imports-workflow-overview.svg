<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#F8FAFC"/>
  <rect x="48" y="48" width="1104" height="96" rx="24" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="84" y="98" fill="#0F172A" font-family="Arial, sans-serif" font-size="30" font-weight="700">Workflow imports V1</text>
  <text x="84" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="18">Domaine - Job - Fichier - Mapping - Preview - Validate - Execute - Rapport</text>

  <rect x="84" y="200" width="220" height="108" rx="24" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="110" y="242" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="18" font-weight="700">1. Choisir le domaine</text>
  <text x="110" y="272" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">spatial-nodes actif en V1</text>

  <rect x="344" y="200" width="220" height="108" rx="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="370" y="242" fill="#15803D" font-family="Arial, sans-serif" font-size="18" font-weight="700">2. Creer un job</text>
  <text x="370" y="272" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Point de travail unique</text>

  <rect x="604" y="200" width="220" height="108" rx="24" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="630" y="242" fill="#B45309" font-family="Arial, sans-serif" font-size="18" font-weight="700">3. Uploader le fichier</text>
  <text x="630" y="272" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">CSV, XLSX ou XLS</text>

  <rect x="864" y="200" width="252" height="108" rx="24" fill="#FCE7F3" stroke="#DB2777" stroke-width="2"/>
  <text x="890" y="242" fill="#BE185D" font-family="Arial, sans-serif" font-size="18" font-weight="700">4. Mapper les colonnes</text>
  <text x="890" y="272" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Champs, transforms, profils</text>

  <rect x="84" y="412" width="220" height="108" rx="24" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="110" y="454" fill="#0369A1" font-family="Arial, sans-serif" font-size="18" font-weight="700">5. Preview</text>
  <text x="110" y="484" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Aucune ecriture metier</text>

  <rect x="344" y="412" width="220" height="108" rx="24" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="370" y="454" fill="#6D28D9" font-family="Arial, sans-serif" font-size="18" font-weight="700">6. Validate</text>
  <text x="370" y="484" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Controle des regles</text>

  <rect x="604" y="412" width="220" height="108" rx="24" fill="#DCFCE7" stroke="#15803D" stroke-width="2"/>
  <text x="630" y="454" fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700">7. Execute</text>
  <text x="630" y="484" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Create ou update reel</text>

  <rect x="864" y="412" width="252" height="108" rx="24" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="890" y="454" fill="#334155" font-family="Arial, sans-serif" font-size="18" font-weight="700">8. Relire le rapport</text>
  <text x="890" y="484" fill="#1E293B" font-family="Arial, sans-serif" font-size="16">Resume et historique du job</text>

  <path d="M304 254H344" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M564 254H604" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M824 254H864" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M194 308V360" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M454 308V360" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M714 308V360" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M990 308V360" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M304 466H344" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M564 466H604" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M824 466H864" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <text x="84" y="620" fill="#475569" font-family="Arial, sans-serif" font-size="18">Preview et Validate preparerent la decision. Execute applique. Le rapport sert a auditer et reprendre.</text>
</svg>
